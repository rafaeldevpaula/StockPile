<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockPile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jersey+10&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand jersey-10-regular" href="index.html">StockPile</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link active" href="index.html">Início</a></li>
                    <li class="nav-item"><a class="nav-link" href="lista.html">Minha Lista</a></li>
                    <li class="nav-item"><a class="nav-link" href="perfil.html">Meu Perfil</a></li>
                </ul>
            </div>
        </div>
    </nav>

   <div id="heroCarousel" class="carousel slide" data-bs-ride="carousel">
        <div class="carousel-indicators">
            <button type="button" data-bs-target="#heroCarousel" data-bs-slide-to="0" class="active"></button>
            <button type="button" data-bs-target="#heroCarousel" data-bs-slide-to="1"></button>
            <button type="button" data-bs-target="#heroCarousel" data-bs-slide-to="2"></button>
        </div>

        <div class="carousel-inner">
            <div class="carousel-item active">
                <img src="/img/gta6.jpg" class="d-block w-100" alt="GTA6">
                <div class="carousel-caption d-none d-md-block bg-dark bg-opacity-75 rounded p-2">
                </div>
            </div>
            
            <div class="carousel-item">
                <img src="/img/eafc26.jpg" class="d-block w-100 img-eafc" alt="EAFC26">
                <div class="carousel-caption d-none d-md-block bg-dark bg-opacity-75 rounded p-2">
                </div>
            </div>

            <div class="carousel-item">
                <img src="/img/re9.jpg" class="d-block w-100" alt="Resident Evil 9">
                <div class="carousel-caption d-none d-md-block bg-dark bg-opacity-75 rounded p-2">
                </div>
            </div>
        </div>

        <button class="carousel-control-prev" type="button" data-bs-target="#heroCarousel" data-bs-slide="prev">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Anterior</span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#heroCarousel" data-bs-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Próximo</span>
        </button>
    </div>

    <div class="container my-5">
        <h2 class="mb-4">Procurar Jogos</h2>
        
        <div class="input-group mb-4 shadow-sm">
            <input type="text" id="inputPesquisa" class="form-control form-control-lg" placeholder="Digite o nome de um jogo (ex: Mario, Zelda)...">
            <button class="btn btn-dark" id="btnPesquisar" type="button">Pesquisar</button>
        </div>

        <div class="row g-4" id="vitrineJogos">
            </div>
    </div>

    <div class="modal fade" id="logModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Registrar Jogo</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="formAdicionarLog">
                        <input type="hidden" id="imagemJogo">

                        <div class="mb-3">
                            <label class="form-label">Nome do Jogo</label>
                            <input type="text" class="form-control" id="nomeJogo" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Status</label>
                            <select class="form-select" id="statusJogo">
                                <option value="jogando">Jogando</option>
                                <option value="quero_jogar">Quero Jogar</option>
                                <option value="zerado">Terminado</option>
                                <option value="abandonado">Abandonado</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Nota (1 a 5)</label>
                            <input type="number" class="form-control" id="notaJogo" min="1" max="5">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Review / Anotações</label>
                            <textarea class="form-control" id="reviewJogo" rows="3"></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-success" id="btnSalvarLog">Guardar na Lista!</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
