<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockPile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jersey+10&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="img/favicon.png">
</head>

<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand jersey-10-regular" href="index.html">StockPile</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link active" href="index.html">Início</a></li>
                    <li class="nav-item"><a class="nav-link" href="lista.html">Minha Lista</a></li>
                    <li class="nav-item"><a class="nav-link" href="perfil.html">Meu Perfil</a></li>
                    <li class="nav-item ms-lg-3" id="navAuthArea">
                        <button class="btn btn-outline-light btn-sm" data-bs-toggle="modal" data-bs-target="#modalAuth">Entrar</button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

   <div id="heroCarousel" class="carousel slide" data-bs-ride="carousel">
        <div class="carousel-indicators">
            <button type="button" data-bs-target="#heroCarousel" data-bs-slide-to="0" class="active"></button>
            <button type="button" data-bs-target="#heroCarousel" data-bs-slide-to="1"></button>
            <button type="button" data-bs-target="#heroCarousel" data-bs-slide-to="2"></button>
        </div>

        <div class="carousel-inner">
            <div class="carousel-item active">
                <div class="carousel-bg-blur" style="background-image: url('img/gta6.jpg');"></div>
                <img src="img/gta6.jpg" class="d-block carousel-img-contain" alt="GTA6">
                <div class="carousel-caption d-none d-md-block bg-dark bg-opacity-75 rounded p-2">
                </div>
            </div>
            
            <div class="carousel-item">
                <div class="carousel-bg-blur" style="background-image: url('img/eafc26.jpg');"></div>
                <img src="img/eafc26.jpg" class="d-block carousel-img-contain" alt="EAFC26">
                <div class="carousel-caption d-none d-md-block bg-dark bg-opacity-75 rounded p-2">
                </div>
            </div>

            <div class="carousel-item">
                <div class="carousel-bg-blur" style="background-image: url('img/re9.jpg');"></div>
                <img src="img/re9.jpg" class="d-block carousel-img-contain" alt="Resident Evil 9">
                <div class="carousel-caption d-none d-md-block bg-dark bg-opacity-75 rounded p-2">
                </div>
            </div>
        </div>

        <button class="carousel-control-prev" type="button" data-bs-target="#heroCarousel" data-bs-slide="prev">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Anterior</span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#heroCarousel" data-bs-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Próximo</span>
        </button>
    </div>

    <div class="container my-5">
        <h2 class="mb-4">Procurar Jogos</h2>
        
        <div class="input-group mb-4 shadow-sm">
            <input type="text" id="inputPesquisa" class="form-control form-control-lg" placeholder="Digite o nome de um jogo (ex: Mario, Zelda)...">
            <button class="btn btn-dark" id="btnPesquisar" type="button">Pesquisar</button>
        </div>

        <div class="row g-4" id="vitrineJogos">
            </div>
    </div>

    <div class="modal fade" id="logModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Registrar Jogo</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="formAdicionarLog">
                        <input type="hidden" id="imagemJogo">

                        <div class="mb-3">
                            <label class="form-label">Nome do Jogo</label>
                            <input type="text" class="form-control" id="nomeJogo" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Status</label>
                            <select class="form-select" id="statusJogo">
                                <option value="jogando">Jogando</option>
                                <option value="quero_jogar">Quero Jogar</option>
                                <option value="zerado">Terminado</option>
                                <option value="abandonado">Abandonado</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Nota (1 a 5)</label>
                            <input type="number" class="form-control" id="notaJogo" min="1" max="5">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Review / Anotações</label>
                            <textarea class="form-control" id="reviewJogo" rows="3"></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-success" id="btnSalvarLog">Guardar na Lista!</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalAuth" tabindex="-1" aria-labelledby="modalAuthLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header bg-dark text-white border-0 py-3">
                    <h5 class="modal-title jersey-10-regular text-purple fs-2" id="modalAuthLabel">StockPile</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <ul class="nav nav-pills nav-fill mb-4 p-1 bg-light rounded-pill" id="pills-tab" role="tablist">
                        <li class="nav-item" role="presentation">
                            <button class="nav-link active rounded-pill fw-semibold py-2" id="tab-login" data-bs-toggle="pill" data-bs-target="#panel-login" type="button" role="tab" aria-selected="true">Entrar</button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link rounded-pill fw-semibold py-2" id="tab-cadastro" data-bs-toggle="pill" data-bs-target="#panel-cadastro" type="button" role="tab" aria-selected="false">Cadastrar-se</button>
                        </li>
                    </ul>
                    
                    <div class="tab-content" id="pills-tabContent">
                        <div class="tab-pane fade show active" id="panel-login" role="tabpanel" aria-labelledby="tab-login">
                            <form id="formLogin">
                                <div class="mb-3">
                                    <label for="loginUsername" class="form-label fw-semibold">Usuário</label>
                                    <input type="text" class="form-control py-2" id="loginUsername" placeholder="Digite seu usuário..." required autocomplete="username">
                                </div>
                                <div class="mb-3">
                                    <label for="loginPassword" class="form-label fw-semibold">Senha</label>
                                    <input type="password" class="form-control py-2" id="loginPassword" placeholder="Digite sua senha..." required autocomplete="current-password">
                                </div>
                                <button type="submit" class="btn btn-primary w-100 py-2.5 mt-3 fw-bold shadow-sm">Fazer Login</button>
                            </form>
                        </div>
                        
                        <div class="tab-pane fade" id="panel-cadastro" role="tabpanel" aria-labelledby="tab-cadastro">
                            <form id="formCadastro">
                                <div class="mb-3">
                                    <label for="cadName" class="form-label fw-semibold">Nome Completo</label>
                                    <input type="text" class="form-control py-2" id="cadName" placeholder="Ex: Gabriel Silva..." required>
                                </div>
                                <div class="mb-3">
                                    <label for="cadUsername" class="form-label fw-semibold">Nome de Usuário</label>
                                    <input type="text" class="form-control py-2" id="cadUsername" placeholder="Ex: gabrielsilva..." required>
                                    <div class="form-text">Usado para fazer login (sem espaços ou caracteres especiais).</div>
                                </div>
                                <div class="mb-3">
                                    <label for="cadBio" class="form-label fw-semibold">Biografia / Descrição (Opcional)</label>
                                    <input type="text" class="form-control py-2" id="cadBio" placeholder="Ex: Apaixonado por RPGs e jogos retrô...">
                                </div>
                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label for="cadPassword" class="form-label fw-semibold">Senha</label>
                                        <input type="password" class="form-control py-2" id="cadPassword" placeholder="Crie uma senha..." required autocomplete="new-password">
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label for="cadConfirmPassword" class="form-label fw-semibold">Confirmar Senha</label>
                                        <input type="password" class="form-control py-2" id="cadConfirmPassword" placeholder="Repita a senha..." required autocomplete="new-password">
                                    </div>
                                </div>
                                <button type="submit" class="btn btn-success w-100 py-2.5 mt-3 fw-bold shadow-sm border-0">Criar Minha Conta</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="customConfirmModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered confirm-modal-dialog">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-body p-4 text-center">
                    <h5 class="fw-bold mb-2">Confirmação</h5>
                    <p class="text-muted mb-4 confirm-text" id="confirmModalText">Mensagem</p>
                    <div class="d-flex gap-2 justify-content-center">
                        <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">Cancelar</button>
                        <button type="button" class="btn btn-danger rounded-pill px-4" id="btnConfirmarAcao">Confirmar</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
